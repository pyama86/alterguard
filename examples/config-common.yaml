pt_osc:
  charset: utf8mb4
  recursion_method: "dsn=D=<db>,t=dsns"
  no_swap_tables: true
  chunk_size: 1000
  max_lag: 1.5
  statistics: true
  dry_run: false
  # no_check_unique_key_change: false  # Disable unique key change check (default: false)
  # Aurora MySQL では recursion_method がレプリカ遅延を検出できないため、information_schema.REPLICA_HOST_STATUS を見て pause-file で抑制する。
  # aurora_replica_check:
  #   enabled: true
  #   max_lag_ms: 1000
  #   check_interval: 5s
  #   pause_file_path: /tmp/alterguard-ptosc-pause

pt_osc_threshold: 1000

alert:
  metadata_lock_threshold_seconds: 30

session_config:
  lock_wait_timeout: 10
  innodb_lock_wait_timeout: 10

# Buffer pool size check threshold (optional, disabled if 0 or not set)
# Drop old table only if buffer pool size is below this threshold (in MB)
# buffer_pool_size_threshold_mb: 100.0
